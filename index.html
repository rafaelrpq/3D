<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game - Three.js</title>
  <script type="module" crossorigin src="/3D/assets/index-B_QWNTNN.js"></script>
  <link rel="stylesheet" crossorigin href="/3D/assets/index-D3abPd-b.css">
</head>

<body>
    <div id="hud">
        <div class="hud-item">
            <span class="hud-label">LIFE</span>
            <div class="energy-bar-container">
                <div id="health-bar"></div>
            </div>
        </div>
        <div class="hud-item">
            <button id="toggle-3d" class="premium-button">3D: OFF</button>
            <div id="intensity-container" class="slider-container" style="display: none;">
                <span class="hud-label small">INTENSITY</span>
                <input type="range" id="anaglyph-intensity" min="0" max="1" step="0.01" value="0.05">
            </div>
        </div>
    </div>

    <div id="overlay">
        <div id="start-screen" class="screen">
            <h1>3D SPACE SURVIVAL</h1>
            <p>Use ARROWS to move, X to jump, S to shoot (hold to charge)</p>
            <p class="blink">Press ENTER to Start</p>
        </div>
        <div id="game-over-screen" class="screen" style="display: none;">
            <h1 class="danger">GAME OVER</h1>
            <p>You were defeated by the space cubes.</p>
            <p class="blink">Press ENTER to Restart</p>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>
</body>

</html>
